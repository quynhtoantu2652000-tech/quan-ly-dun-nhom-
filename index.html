<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hệ thống Quản lý Bảo trì</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #f59e0b;
    --accent2: #3b82f6;
    --danger: #ef4444;
    --success: #10b981;
    --warning: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --radius: 8px;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }
  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-track { background:var(--surface); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* Layout */
  .app-shell { display:flex; min-height:100vh; }
  .sidebar { width:240px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; z-index:100; transition:transform .25s; }
  .sidebar.collapsed { transform:translateX(-240px); }
  .main { flex:1; margin-left:240px; display:flex; flex-direction:column; min-height:100vh; transition:margin .25s; }
  .main.full { margin-left:0; }
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
  .content { padding:24px; flex:1; max-width:1400px; width:100%; }

  /* Sidebar */
  .sidebar-logo { padding:20px 20px 16px; border-bottom:1px solid var(--border); }
  .sidebar-logo h2 { font-size:13px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); }
  .sidebar-logo p { font-size:11px; color:var(--text3); margin-top:2px; font-family:var(--mono); }
  .nav-section { padding:12px 0; border-bottom:1px solid var(--border); }
  .nav-label { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); padding:0 16px 8px; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:9px 16px; cursor:pointer; border-radius:0; transition:all .15s; font-size:13px; color:var(--text2); position:relative; }
  .nav-item:hover { color:var(--text); background:rgba(255,255,255,.04); }
  .nav-item.active { color:var(--accent); background:rgba(245,158,11,.08); }
  .nav-item.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--accent); }
  .nav-icon { font-size:16px; width:20px; text-align:center; }
  .sidebar-footer { margin-top:auto; padding:16px; border-top:1px solid var(--border); }
  .user-card { display:flex; align-items:center; gap:10px; }
  .user-avatar { width:34px; height:34px; border-radius:6px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#000; flex-shrink:0; }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-role { font-size:11px; color:var(--text3); font-family:var(--mono); }
  .logout-btn { background:none; border:none; color:var(--text3); cursor:pointer; font-size:16px; padding:4px; border-radius:4px; }
  .logout-btn:hover { color:var(--danger); }

  /* Cards */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); }
  .card-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .card-title { font-size:14px; font-weight:600; }
  .card-body { padding:20px; }

  /* Stats */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:24px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; position:relative; overflow:hidden; }
  .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .stat-card.yellow::before { background:var(--accent); }
  .stat-card.blue::before { background:var(--accent2); }
  .stat-card.green::before { background:var(--success); }
  .stat-card.red::before { background:var(--danger); }
  .stat-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
  .stat-value { font-size:28px; font-weight:700; font-family:var(--mono); line-height:1; }
  .stat-sub { font-size:12px; color:var(--text3); margin-top:6px; }

  /* Buttons */
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:6px; font-size:13px; font-weight:500; cursor:pointer; border:none; transition:all .15s; font-family:var(--font); }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-primary:hover { background:#d97706; }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger { background:rgba(239,68,68,.15); color:var(--danger); border:1px solid rgba(239,68,68,.3); }
  .btn-danger:hover { background:rgba(239,68,68,.25); }
  .btn-sm { padding:5px 10px; font-size:12px; }
  .btn-icon { padding:7px; }

  /* Badges */
  .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:600; font-family:var(--mono); }
  .badge-new { background:rgba(59,130,246,.15); color:#60a5fa; border:1px solid rgba(59,130,246,.2); }
  .badge-processing { background:rgba(245,158,11,.15); color:#fbbf24; border:1px solid rgba(245,158,11,.2); }
  .badge-done { background:rgba(16,185,129,.15); color:#34d399; border:1px solid rgba(16,185,129,.2); }
  .badge-closed { background:rgba(100,116,139,.15); color:#94a3b8; border:1px solid rgba(100,116,139,.2); }
  .badge-high { background:rgba(239,68,68,.15); color:#f87171; border:1px solid rgba(239,68,68,.2); }
  .badge-medium { background:rgba(245,158,11,.15); color:#fbbf24; border:1px solid rgba(245,158,11,.2); }
  .badge-low { background:rgba(16,185,129,.15); color:#34d399; border:1px solid rgba(16,185,129,.2); }

  /* Table */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:10px 14px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--text3); border-bottom:1px solid var(--border); white-space:nowrap; }
  td { padding:12px 14px; border-bottom:1px solid rgba(30,45,69,.5); vertical-align:middle; }
  tr:hover td { background:rgba(255,255,255,.02); }
  .mono { font-family:var(--mono); font-size:12px; }

  /* Forms */
  .form-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:16px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group.full { grid-column:1/-1; }
  label { font-size:12px; font-weight:500; color:var(--text2); }
  input, select, textarea { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:9px 12px; color:var(--text); font-size:13px; font-family:var(--font); width:100%; transition:border-color .15s; outline:none; }
  input:focus, select:focus, textarea:focus { border-color:var(--accent); }
  select option { background:var(--surface); }
  textarea { resize:vertical; min-height:80px; }
  .input-group { position:relative; }
  .input-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:14px; pointer-events:none; }
  .input-group input { padding-left:34px; }

  /* Login */
  .login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:20px; }
  .login-box { width:100%; max-width:400px; }
  .login-header { text-align:center; margin-bottom:32px; }
  .login-logo { width:60px; height:60px; background:var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 16px; }
  .login-header h1 { font-size:20px; font-weight:700; }
  .login-header p { font-size:13px; color:var(--text3); margin-top:4px; }
  .login-form { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:28px; }
  .error-msg { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.2); color:#f87171; padding:10px 14px; border-radius:6px; font-size:13px; margin-bottom:16px; }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(4px); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; width:100%; max-width:600px; max-height:90vh; overflow-y:auto; }
  .modal-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-title { font-size:16px; font-weight:700; }
  .modal-body { padding:24px; }
  .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }

  /* Tabs */
  .tabs { display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:20px; }
  .tab { padding:10px 16px; font-size:13px; cursor:pointer; color:var(--text3); border-bottom:2px solid transparent; transition:all .15s; }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab:hover:not(.active) { color:var(--text); }

  /* Search bar */
  .search-row { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
  .search-row input, .search-row select { flex:1; min-width:140px; }

  /* Priority dot */
  .dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:4px; }
  .dot-high { background:var(--danger); }
  .dot-medium { background:var(--warning); }
  .dot-low { background:var(--success); }

  /* Toggle */
  .menu-btn { display:none; background:none; border:none; color:var(--text); cursor:pointer; font-size:20px; padding:4px; }
  .overlay-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:90; }

  /* Responsive */
  @media(max-width:768px) {
    .sidebar { transform:translateX(-240px); }
    .sidebar.open { transform:translateX(0); }
    .main { margin-left:0 !important; }
    .content { padding:16px; }
    .menu-btn { display:block; }
    .overlay-bg.show { display:block; }
    .stats-grid { grid-template-columns:1fr 1fr; gap:12px; }
    .form-grid { grid-template-columns:1fr; }
    .topbar { padding:0 16px; }
    .modal { border-radius:0; max-height:100vh; }
    .modal-overlay { padding:0; align-items:flex-end; }
    .hide-mobile { display:none; }
  }
  @media(max-width:400px) {
    .stats-grid { grid-template-columns:1fr; }
  }

  /* Chart container */
  .chart-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:16px; margin-bottom:24px; }

  /* Empty state */
  .empty { text-align:center; padding:48px 20px; color:var(--text3); }
  .empty-icon { font-size:40px; margin-bottom:12px; }
  .empty p { font-size:13px; }

  /* Scrollable table container */
  .requests-table td:last-child { white-space:nowrap; }

  /* Notification toast */
  .toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px 18px; font-size:13px; z-index:999; box-shadow:0 8px 32px rgba(0,0,0,.4); max-width:320px; animation:slideIn .2s ease; }
  .toast.success { border-left:3px solid var(--success); }
  .toast.error { border-left:3px solid var(--danger); }
  @keyframes slideIn { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }

  /* Detail view */
  .detail-row { display:flex; padding:10px 0; border-bottom:1px solid rgba(30,45,69,.5); font-size:13px; }
  .detail-row:last-child { border-bottom:none; }
  .detail-label { width:160px; color:var(--text3); flex-shrink:0; }
  .detail-value { flex:1; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, LineChart, Line, PieChart, Pie, Cell, Legend } = Recharts;

// ─── Mock Data ───────────────────────────────────────────────
const USERS_DB = [

  { id:'u6', employee_id:'BT002', name:'Hoàng Văn Tùng', role:'maintenance', department:'Bảo trì', password:'123456' },

const REQUESTS_INIT = [
  { id:'REQ-001', machine_code:'M-AL-001', machine_name:'Máy đùn nhôm #1', department:'Sản xuất A', description:'Trục chính bị rung, tiếng ồn lớn bất thường khi vận hành', priority:'high', status:'done', created_at:'2024-12-15T08:30:00', created_by:'u2', images:[] },
  { id:'REQ-002', machine_code:'M-AL-003', machine_name:'Máy cắt tự động #3', department:'Sản xuất B', description:'Lưỡi cắt bị mòn, chất lượng cắt không đạt yêu cầu', priority:'medium', status:'processing', created_at:'2024-12-18T10:15:00', created_by:'u5', images:[] },
  { id:'REQ-003', machine_code:'M-CR-002', machine_name:'Máy nén khí #2', department:'Sản xuất A', description:'Áp suất không đạt 8 bar, máy dừng sau 20 phút hoạt động', priority:'high', status:'new', created_at:'2024-12-20T14:00:00', created_by:'u2', images:[] },
  { id:'REQ-004', machine_code:'M-OX-001', machine_name:'Bể oxy hóa #1', department:'Sản xuất B', description:'Nhiệt độ dung dịch không ổn định, dao động 5-10 độ', priority:'low', status:'closed', created_at:'2024-12-10T09:00:00', created_by:'u5', images:[] },
  { id:'REQ-005', machine_code:'M-AL-002', machine_name:'Máy đùn nhôm #2', department:'Sản xuất A', description:'Bơm dầu thủy lực bị rỉ, áp suất giảm dần', priority:'high', status:'new', created_at:'2024-12-21T07:45:00', created_by:'u2', images:[] },
  { id:'REQ-006', machine_code:'M-CUT-001', machine_name:'Máy cắt CNC #1', department:'Sản xuất A', description:'Encoder bị lỗi, dịch chuyển không chính xác', priority:'medium', status:'processing', created_at:'2024-12-19T11:30:00', created_by:'u2', images:[] },
];

const MAINT_LOGS_INIT = [
  { id:'L1', request_id:'REQ-001', cause:'Vòng bi trục chính bị mòn do thiếu bôi trơn định kỳ', solution:'Thay thế vòng bi SKF 6210-2RS, bổ sung mỡ bôi trơn', start_time:'2024-12-15T09:00:00', end_time:'2024-12-15T13:30:00', downtime:270, result:'Hoàn thành, máy hoạt động bình thường', technician:'u3' },
  { id:'L2', request_id:'REQ-002', cause:'Lưỡi cắt TCT bị mòn sau 2000 giờ hoạt động', solution:'Thay lưỡi cắt mới, hiệu chỉnh khoảng cách cắt', start_time:'2024-12-18T11:00:00', end_time:'2024-12-18T14:00:00', downtime:180, result:'Đang hoàn thiện, kiểm tra chất lượng', technician:'u6' },
  { id:'L3', request_id:'REQ-004', cause:'Bộ điều khiển nhiệt độ bị lỗi sensor PTC', solution:'Thay sensor nhiệt độ PTC, hiệu chỉnh bộ điều khiển', start_time:'2024-12-10T10:00:00', end_time:'2024-12-10T15:00:00', downtime:300, result:'Hoàn thành, nhiệt độ ổn định', technician:'u3' },
];

// Monthly stats for charts
const MONTHLY_DATA = [
  { month:'T7', incidents:8, downtime:420 },
  { month:'T8', incidents:12, downtime:680 },
  { month:'T9', incidents:6, downtime:310 },
  { month:'T10', incidents:15, downtime:890 },
  { month:'T11', incidents:9, downtime:520 },
  { month:'T12', incidents:6, downtime:270 },
];

const ERROR_TYPE_DATA = [
  { name:'Cơ khí', value:35, color:'#f59e0b' },
  { name:'Điện / Điều khiển', value:25, color:'#3b82f6' },
  { name:'Thủy lực', value:18, color:'#8b5cf6' },
  { name:'Khác', value:22, color:'#64748b' },
];

// ─── Helpers ─────────────────────────────────────────────────
const ROLES = { admin:'Admin', production:'Sản xuất', maintenance:'Bảo trì', manager:'Quản lý' };
const STATUS_LABEL = { new:'Mới tạo', processing:'Đang xử lý', done:'Hoàn thành', closed:'Đóng' };
const STATUS_BADGE = { new:'badge-new', processing:'badge-processing', done:'badge-done', closed:'badge-closed' };
const PRIORITY_LABEL = { high:'Cao', medium:'Trung bình', low:'Thấp' };
const PRIORITY_BADGE = { high:'badge-high', medium:'badge-medium', low:'badge-low' };

const fmt = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
};
const fmtMin = (mins) => {
  if (!mins) return '—';
  const h = Math.floor(mins/60), m = mins%60;
  return h>0 ? `${h}h ${m}p` : `${m}p`;
};
const genId = (prefix) => `${prefix}-${String(Date.now()).slice(-6)}`;

// ─── Toast ────────────────────────────────────────────────────
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type}`}>{msg}</div>;
}

// ─── Login Screen ─────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [eid, setEid] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    if (!eid || !pw) { setErr('Vui lòng nhập đầy đủ thông tin'); return; }
    setLoading(true); setErr('');
    await new Promise(r => setTimeout(r, 600));
    const user = USERS_DB.find(u => u.employee_id === eid.toUpperCase() && u.password === pw);
    if (user) onLogin(user);
    else { setErr('Mã nhân viên hoặc mật khẩu không đúng'); setLoading(false); }
  };

  return (
    <div className="login-screen">
      <div className="login-box">
        <div className="login-header">
          <div className="login-logo">⚙️</div>
          <h1>Hệ thống Bảo trì</h1>
          <p>Quản lý sửa chữa & bảo dưỡng nhà máy</p>
        </div>
        <div className="login-form">
          {err && <div className="error-msg">⚠️ {err}</div>}
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div className="form-group">
              <label>Mã nhân viên</label>
              <div className="input-group">
                <span className="input-icon">👤</span>
                <input placeholder="VD: ADMIN001" value={eid} onChange={e=>setEid(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} style={{textTransform:'uppercase'}}/>
              </div>
            </div>
            <div className="form-group">
              <label>Mật khẩu</label>
              <div className="input-group">
                <span className="input-icon">🔒</span>
                <input type="password" placeholder="Nhập mật khẩu" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
              </div>
            </div>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'11px',marginTop:4}} onClick={handleLogin} disabled={loading}>
              {loading ? '⏳ Đang đăng nhập...' : '🔑 Đăng nhập'}
            </button>
          </div>
          <p style={{textAlign:'center',marginTop:16,fontSize:12,color:'var(--text3)'}}>
            Demo: ADMIN001 / admin123 &nbsp;|&nbsp; SX001 / 123456
          </p>
        </div>
      </div>
    </div>
  );
}

// ─── Requests List ────────────────────────────────────────────
function RequestsList({ requests, logs, user, onUpdate, setPage, toast }) {
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [filterPriority, setFilterPriority] = useState('');
  const [filterDate, setFilterDate] = useState('');
  const [selected, setSelected] = useState(null);
  const [showMaintModal, setShowMaintModal] = useState(false);
  const [maintForm, setMaintForm] = useState({ cause:'', solution:'', start_time:'', end_time:'', result:'' });

  const filtered = requests.filter(r => {
    const q = search.toLowerCase();
    if (q && !r.machine_code.toLowerCase().includes(q) && !r.description.toLowerCase().includes(q) && !r.id.toLowerCase().includes(q)) return false;
    if (filterStatus && r.status !== filterStatus) return false;
    if (filterPriority && r.priority !== filterPriority) return false;
    if (filterDate) {
      const rd = r.created_at.slice(0,7);
      if (rd !== filterDate) return false;
    }
    return true;
  });

  const getLog = (rid) => logs.find(l=>l.request_id===rid);

  const handleStatusChange = (req, newStatus) => {
    if (newStatus === 'processing' && !getLog(req.id)) {
      setSelected(req);
      setShowMaintModal(true);
      setMaintForm({ cause:'', solution:'', start_time:new Date().toISOString().slice(0,16), end_time:'', result:'' });
      return;
    }
    onUpdate('request', { ...req, status: newStatus });
    toast('Cập nhật trạng thái thành công', 'success');
  };

  const submitMaint = () => {
    if (!maintForm.cause || !maintForm.start_time) { toast('Vui lòng nhập đầy đủ thông tin bắt buộc', 'error'); return; }
    const down = maintForm.end_time ? Math.round((new Date(maintForm.end_time)-new Date(maintForm.start_time))/60000) : 0;
    const log = { id:'L'+Date.now(), request_id:selected.id, ...maintForm, downtime:down, technician:user.id };
    onUpdate('log', log);
    onUpdate('request', { ...selected, status:'processing' });
    setShowMaintModal(false);
    toast('Đã tạo phiếu bảo trì và cập nhật trạng thái', 'success');
  };

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:700}}>Danh sách yêu cầu</h2>
          <p style={{fontSize:13,color:'var(--text3)',marginTop:4}}>{filtered.length} yêu cầu</p>
        </div>
        {(user.role==='admin'||user.role==='production') &&
          <button className="btn btn-primary" onClick={()=>setPage('create')}>➕ Tạo yêu cầu mới</button>
        }
      </div>

      <div className="search-row">
        <input placeholder="🔍 Tìm mã máy, mô tả lỗi..." value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:280}}/>
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
          <option value="">Tất cả trạng thái</option>
          {Object.entries(STATUS_LABEL).map(([k,v])=><option key={k} value={k}>{v}</option>)}
        </select>
        <select value={filterPriority} onChange={e=>setFilterPriority(e.target.value)}>
          <option value="">Tất cả ưu tiên</option>
          {Object.entries(PRIORITY_LABEL).map(([k,v])=><option key={k} value={k}>{v}</option>)}
        </select>
        <input type="month" value={filterDate} onChange={e=>setFilterDate(e.target.value)} style={{maxWidth:160}}/>
      </div>

      <div className="card">
        <div className="table-wrap">
          <table className="requests-table">
            <thead><tr>
              <th>Mã YC</th><th>Máy</th><th>Mô tả</th><th>Bộ phận</th>
              <th>Ưu tiên</th><th>Trạng thái</th><th className="hide-mobile">Thời gian</th>
              {(user.role==='admin'||user.role==='maintenance') && <th>Thao tác</th>}
            </tr></thead>
            <tbody>
              {filtered.length === 0 && <tr><td colSpan={8} style={{textAlign:'center',padding:40,color:'var(--text3)'}}>Không có dữ liệu</td></tr>}
              {filtered.map(r=>(
                <tr key={r.id} onClick={()=>setSelected(r===selected?null:r)} style={{cursor:'pointer'}}>
                  <td className="mono" style={{color:'var(--accent)'}}>{r.id}</td>
                  <td>
                    <div style={{fontWeight:600,fontSize:13}}>{r.machine_code}</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>{r.machine_name}</div>
                  </td>
                  <td style={{maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.description}</td>
                  <td style={{fontSize:12,color:'var(--text2)'}}>{r.department}</td>
                  <td><span className={`badge ${PRIORITY_BADGE[r.priority]}`}><span className={`dot dot-${r.priority}`}/>{PRIORITY_LABEL[r.priority]}</span></td>
                  <td><span className={`badge ${STATUS_BADGE[r.status]}`}>{STATUS_LABEL[r.status]}</span></td>
                  <td className="hide-mobile" style={{color:'var(--text3)',fontSize:12}}>{fmt(r.created_at)}</td>
                  {(user.role==='admin'||user.role==='maintenance') && (
                    <td onClick={e=>e.stopPropagation()}>
                      <select value={r.status} onChange={e=>handleStatusChange(r,e.target.value)}
                        style={{padding:'4px 8px',fontSize:12,background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:4}}>
                        {Object.entries(STATUS_LABEL).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                      </select>
                    </td>
                  )}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Detail panel */}
      {selected && (
        <div className="card" style={{marginTop:16}}>
          <div className="card-header">
            <span className="card-title">Chi tiết: {selected.id}</span>
            <button className="btn btn-sm btn-secondary" onClick={()=>setSelected(null)}>✕ Đóng</button>
          </div>
          <div className="card-body">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
              <div>
                <div className="detail-row"><span className="detail-label">Mã máy</span><span className="detail-value mono">{selected.machine_code}</span></div>
                <div className="detail-row"><span className="detail-label">Tên máy</span><span className="detail-value">{selected.machine_name}</span></div>
                <div className="detail-row"><span className="detail-label">Bộ phận</span><span className="detail-value">{selected.department}</span></div>
                <div className="detail-row"><span className="detail-label">Mức ưu tiên</span><span className="detail-value"><span className={`badge ${PRIORITY_BADGE[selected.priority]}`}>{PRIORITY_LABEL[selected.priority]}</span></span></div>
                <div className="detail-row"><span className="detail-label">Trạng thái</span><span className="detail-value"><span className={`badge ${STATUS_BADGE[selected.status]}`}>{STATUS_LABEL[selected.status]}</span></span></div>
                <div className="detail-row"><span className="detail-label">Thời gian tạo</span><span className="detail-value" style={{fontSize:12}}>{fmt(selected.created_at)}</span></div>
                <div className="detail-row" style={{border:'none'}}><span className="detail-label">Mô tả lỗi</span><span className="detail-value">{selected.description}</span></div>
              </div>
              {getLog(selected.id) && (
                <div style={{background:'var(--surface2)',borderRadius:8,padding:16}}>
                  <p style={{fontSize:12,fontWeight:600,color:'var(--accent)',marginBottom:12}}>🔧 THÔNG TIN BẢO TRÌ</p>
                  {[
                    ['Nguyên nhân', getLog(selected.id).cause],
                    ['Phương án xử lý', getLog(selected.id).solution],
                    ['Bắt đầu', fmt(getLog(selected.id).start_time)],
                    ['Hoàn thành', fmt(getLog(selected.id).end_time)],
                    ['Downtime', fmtMin(getLog(selected.id).downtime)],
                    ['Kết quả', getLog(selected.id).result],
                  ].map(([k,v])=>(
                    <div className="detail-row" key={k} style={{borderColor:'rgba(255,255,255,.05)'}}>
                      <span className="detail-label" style={{width:120}}>{k}</span>
                      <span className="detail-value" style={{fontSize:12}}>{v||'—'}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* Maintenance modal */}
      {showMaintModal && (
        <div className="modal-overlay">
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">🔧 Tạo phiếu bảo trì — {selected?.id}</span>
              <button className="btn btn-sm btn-secondary" onClick={()=>setShowMaintModal(false)}>✕</button>
            </div>
            <div className="modal-body">
              <div className="form-grid">
                <div className="form-group full">
                  <label>Nguyên nhân *</label>
                  <textarea placeholder="Mô tả nguyên nhân sự cố..." value={maintForm.cause} onChange={e=>setMaintForm({...maintForm,cause:e.target.value})}/>
                </div>
                <div className="form-group full">
                  <label>Phương án xử lý</label>
                  <textarea placeholder="Các bước thực hiện sửa chữa..." value={maintForm.solution} onChange={e=>setMaintForm({...maintForm,solution:e.target.value})}/>
                </div>
                <div className="form-group">
                  <label>Thời gian bắt đầu *</label>
                  <input type="datetime-local" value={maintForm.start_time} onChange={e=>setMaintForm({...maintForm,start_time:e.target.value})}/>
                </div>
                <div className="form-group">
                  <label>Thời gian hoàn thành</label>
                  <input type="datetime-local" value={maintForm.end_time} onChange={e=>setMaintForm({...maintForm,end_time:e.target.value})}/>
                </div>
                {maintForm.start_time && maintForm.end_time && (
                  <div className="form-group full">
                    <label>Downtime (tự tính)</label>
                    <input readOnly value={fmtMin(Math.round((new Date(maintForm.end_time)-new Date(maintForm.start_time))/60000))} style={{color:'var(--accent)'}}/>
                  </div>
                )}
                <div className="form-group full">
                  <label>Kết quả xử lý</label>
                  <input placeholder="VD: Hoàn thành, máy hoạt động bình thường" value={maintForm.result} onChange={e=>setMaintForm({...maintForm,result:e.target.value})}/>
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowMaintModal(false)}>Hủy</button>
              <button className="btn btn-primary" onClick={submitMaint}>✅ Lưu & Cập nhật</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Create Request ────────────────────────────────────────────
function CreateRequest({ user, onSubmit, toast }) {
  const [form, setForm] = useState({ machine_code:'', machine_name:'', department:user.department||'', description:'', priority:'medium' });
  const [loading, setLoading] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleSubmit = async () => {
    if (!form.machine_code || !form.description) { toast('Vui lòng điền mã máy và mô tả lỗi', 'error'); return; }
    setLoading(true);
    await new Promise(r=>setTimeout(r,500));
    const req = { id:genId('REQ'), ...form, status:'new', created_at:new Date().toISOString(), created_by:user.id, images:[] };
    onSubmit(req);
    setForm({ machine_code:'', machine_name:'', department:user.department||'', description:'', priority:'medium' });
    setLoading(false);
    toast('✅ Yêu cầu sửa chữa đã được tạo thành công!', 'success');
  };

  return (
    <div>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:18,fontWeight:700}}>Tạo yêu cầu sửa chữa mới</h2>
        <p style={{fontSize:13,color:'var(--text3)',marginTop:4}}>Điền đầy đủ thông tin để gửi yêu cầu</p>
      </div>

      <div className="card">
        <div className="card-body">
          <div className="form-grid">
            <div className="form-group">
              <label>Mã máy / Thiết bị *</label>
              <input placeholder="VD: M-AL-001" value={form.machine_code} onChange={e=>set('machine_code',e.target.value.toUpperCase())} style={{textTransform:'uppercase'}}/>
            </div>
            <div className="form-group">
              <label>Tên máy</label>
              <input placeholder="VD: Máy đùn nhôm #1" value={form.machine_name} onChange={e=>set('machine_name',e.target.value)}/>

            <div className="form-group">
              <label>Bộ phận</label>
              <select value={form.department} onChange={e=>set('department',e.target.value)}>
                <option value="">Chọn bộ phận</option>
                {['Sản xuất A','Sản xuất B','Sản xuất C','Bảo trì','Kỹ thuật','Kho'].map(d=><option key={d}>{d}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Mức độ ưu tiên</label>
              <select value={form.priority} onChange={e=>set('priority',e.target.value)}>
                <option value="high">🔴 Cao — Ảnh hưởng sản xuất ngay</option>
                <option value="medium">🟡 Trung bình — Cần xử lý sớm</option>
                <option value="low">🟢 Thấp — Có thể lên lịch</option>
              </select>
            </div>
            <div className="form-group full">
              <label>Mô tả lỗi / Hiện tượng *</label>
              <textarea rows={4} placeholder="Mô tả chi tiết triệu chứng, hiện tượng bất thường, thời điểm xảy ra..." value={form.description} onChange={e=>set('description',e.target.value)}/>
            </div>
            <div className="form-group full">
              <label>📷 Ảnh chụp (tùy chọn)</label>
              <div style={{border:'2px dashed var(--border)',borderRadius:8,padding:32,textAlign:'center',cursor:'pointer',color:'var(--text3)',fontSize:13}} onClick={()=>toast('Chức năng upload ảnh kết nối Firebase Storage trong phiên bản thực','success')}>
                <div style={{fontSize:32,marginBottom:8}}>📷</div>
                <p>Nhấn để chọn ảnh từ máy hoặc chụp trực tiếp</p>
                <p style={{fontSize:11,marginTop:4}}>PNG, JPG tối đa 10MB</p>
              </div>
            </div>
          </div>

          <div style={{marginTop:24,padding:16,background:'var(--surface2)',borderRadius:8,border:'1px solid var(--border)'}}>
            <p style={{fontSize:12,color:'var(--text3)',marginBottom:8}}>📋 Xem trước thông báo Zalo sẽ gửi:</p>
            <p style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text2)',lineHeight:1.6}}>
              🔴 [YÊU CẦU SỬA CHỮA MỚI]<br/>
              📦 Máy: <b>{form.machine_code||'...'}</b><br/>
              ⚠️ Lỗi: {form.description||'...'}<br/>

          </div>

          <div style={{display:'flex',justifyContent:'flex-end',gap:10,marginTop:20}}>

          </div>
        </div>

    </div>
  );
}

// ─── Reports ──────────────────────────────────────────────────
function Reports({ requests, logs }) {
  const totalDown = logs.reduce((s,l)=>s+l.downtime,0);
  const avgDown = logs.length ? Math.round(totalDown/logs.length) : 0;
  const doneCount = requests.filter(r=>r.status==='done'||r.status==='closed').length;

  return (
    <div>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:18,fontWeight:700}}>Báo cáo & Thống kê</h2>
        <p style={{fontSize:13,color:'var(--text3)',marginTop:4}}>Tổng hợp dữ liệu vận hành</p>
      </div>

      <div className="stats-grid" style={{gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))'}}>
        {[
          ['Tổng sự cố', requests.length, 'yellow'],
          ['Đã hoàn thành', doneCount, 'green'],
          ['Tổng downtime', fmtMin(totalDown), 'red'],
          ['Downtime TB/lần', fmtMin(avgDown), 'blue'],
        ].map(([label,val,color])=>(
          <div key={label} className={`stat-card ${color}`}>
            <div className="stat-label">{label}</div>
            <div className="stat-value" style={{fontSize:typeof val==='string'?20:28}}>{val}</div>
          </div>
        ))}
      </div>

      <div className="chart-row">
        <div className="card">
          <div className="card-header"><span className="card-title">Downtime theo tháng (phút)</span></div>
          <div className="card-body" style={{height:220}}>
            <ResponsiveContainer width="100%" height="100%">
              <LineChart data={MONTHLY_DATA}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e2d45"/>
                <XAxis dataKey="month" tick={{fill:'#64748b',fontSize:12}}/>
                <YAxis tick={{fill:'#64748b',fontSize:12}}/>
                <Tooltip contentStyle={{background:'#111827',border:'1px solid #1e2d45',borderRadius:6,fontSize:12}}/>
                <Line type="monotone" dataKey="downtime" stroke="#ef4444" strokeWidth={2} dot={{fill:'#ef4444',r:4}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        </div>

        <div className="card">
          <div className="card-header"><span className="card-title">So sánh sự cố vs downtime</span></div>
          <div className="card-body" style={{height:220}}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={MONTHLY_DATA}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e2d45"/>
                <XAxis dataKey="month" tick={{fill:'#64748b',fontSize:12}}/>
                <YAxis yAxisId="l" orientation="left" tick={{fill:'#64748b',fontSize:11}}/>
                <YAxis yAxisId="r" orientation="right" tick={{fill:'#64748b',fontSize:11}}/>
                <Tooltip contentStyle={{background:'#111827',border:'1px solid #1e2d45',borderRadius:6,fontSize:12}}/>
                <Legend formatter={v=><span style={{fontSize:12,color:'#94a3b8'}}>{v}</span>}/>
                <Bar yAxisId="l" dataKey="incidents" name="Sự cố" fill="#f59e0b" radius={[3,3,0,0]}/>
                <Bar yAxisId="r" dataKey="downtime" name="Downtime(p)" fill="#3b82f6" radius={[3,3,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header"><span className="card-title">Chi tiết phiếu bảo trì</span></div>
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>Mã YC</th><th>Nguyên nhân</th><th>Phương án</th><th>Bắt đầu</th><th>Kết thúc</th><th>Downtime</th><th>Kết quả</th>
            </tr></thead>
            <tbody>
              {logs.map(l=>(
                <tr key={l.id}>
                  <td className="mono" style={{color:'var(--accent)'}}>{l.request_id}</td>
                  <td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12}}>{l.cause}</td>
                  <td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12}}>{l.solution}</td>
                  <td style={{fontSize:12,color:'var(--text3)'}}>{fmt(l.start_time)}</td>
                  <td style={{fontSize:12,color:'var(--text3)'}}>{fmt(l.end_time)}</td>
                  <td><span className="badge badge-high">{fmtMin(l.downtime)}</span></td>
                  <td style={{fontSize:12,color:'var(--success)'}}>{l.result}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── Users Management ─────────────────────────────────────────
function UsersManagement({ toast }) {
  const [users, setUsers] = useState(USERS_DB);
  const [showModal, setShowModal] = useState(false);
  const [search, setSearch] = useState('');
  const [form, setForm] = useState({ employee_id:'', name:'', role:'production', department:'', password:'' });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const filtered = users.filter(u=>
    u.employee_id.toLowerCase().includes(search.toLowerCase()) ||
    u.name.toLowerCase().includes(search.toLowerCase())
  );

  const handleCreate = () => {
    if (!form.employee_id || !form.name || !form.password) { toast('Vui lòng điền đầy đủ thông tin', 'error'); return; }
    if (users.find(u=>u.employee_id===form.employee_id.toUpperCase())) { toast('Mã nhân viên đã tồn tại', 'error'); return; }
    const newUser = { id:'u'+Date.now(), ...form, employee_id:form.employee_id.toUpperCase() };
    setUsers(u=>[...u, newUser]);
    setShowModal(false);
    setForm({ employee_id:'', name:'', role:'production', department:'', password:'' });
    toast('Tạo tài khoản thành công', 'success');
  };

  const handleDelete = (uid) => {
    if (uid === 'u1') { toast('Không thể xóa tài khoản Admin gốc', 'error'); return; }
    setUsers(u=>u.filter(x=>x.id!==uid));
    toast('Đã xóa tài khoản', 'success');
  };

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <div>
          <h2 style={{fontSize:18,fontWeight:700}}>Quản lý tài khoản</h2>
          <p style={{fontSize:13,color:'var(--text3)',marginTop:4}}>{users.length} tài khoản</p>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>➕ Tạo tài khoản</button>
      </div>

      <div className="search-row">
        <input placeholder="🔍 Tìm mã nhân viên, tên..." value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:300}}/>
      </div>

      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>Mã NV</th><th>Họ tên</th><th>Vai trò</th><th>Bộ phận</th><th>Firebase email</th><th>Thao tác</th>
            </tr></thead>
            <tbody>
              {filtered.map(u=>(
                <tr key={u.id}>
                  <td className="mono" style={{color:'var(--accent)'}}>{u.employee_id}</td>
                  <td style={{fontWeight:500}}>{u.name}</td>
                  <td><span className="badge badge-processing">{ROLES[u.role]}</span></td>
                  <td style={{fontSize:12,color:'var(--text2)'}}>{u.department||'—'}</td>
                  <td className="mono" style={{fontSize:11,color:'var(--text3)'}}>{u.employee_id.toLowerCase()}@company.com</td>
                  <td>
                    <button className="btn btn-sm btn-danger" onClick={()=>handleDelete(u.id)}>🗑️</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {showModal && (
        <div className="modal-overlay">
          <div className="modal">
            <div className="modal-header">
              <span className="modal-title">➕ Tạo tài khoản mới</span>
              <button className="btn btn-sm btn-secondary" onClick={()=>setShowModal(false)}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.2)',borderRadius:8,padding:12,marginBottom:16,fontSize:12,color:'#fbbf24'}}>
                💡 Firebase sẽ tạo email giả: <b>{form.employee_id.toUpperCase()||'MANV'}@company.com</b>
              </div>
              <div className="form-grid">
                <div className="form-group">
                  <label>Mã nhân viên *</label>
                  <input placeholder="VD: SX003" value={form.employee_id} onChange={e=>set('employee_id',e.target.value.toUpperCase())} style={{textTransform:'uppercase'}}/>
                </div>
                <div className="form-group">
                  <label>Họ và tên *</label>
                  <input placeholder="Nguyễn Văn A" value={form.name} onChange={e=>set('name',e.target.value)}/>
                </div>
                <div className="form-group">
                  <label>Vai trò</label>
                  <select value={form.role} onChange={e=>set('role',e.target.value)}>
                    {Object.entries(ROLES).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>Bộ phận</label>
                  <select value={form.department} onChange={e=>set('department',e.target.value)}>
                    <option value="">Chọn bộ phận</option>
                    {['Sản xuất A','Sản xuất B','Sản xuất C','Bảo trì','Kỹ thuật','Quản lý'].map(d=><option key={d}>{d}</option>)}
                  </select>
                </div>
                <div className="form-group full">
                  <label>Mật khẩu *</label>
                  <input type="password" placeholder="Tối thiểu 6 ký tự" value={form.password} onChange={e=>set('password',e.target.value)}/>
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={()=>setShowModal(false)}>Hủy</button>
              <button className="btn btn-primary" onClick={handleCreate}>✅ Tạo tài khoản</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [requests, setRequests] = useState(REQUESTS_INIT);
  const [logs, setLogs] = useState(MAINT_LOGS_INIT);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [toastMsg, setToastMsg] = useState(null);

  const toast = (msg, type='success') => {
    setToastMsg({ msg, type, key:Date.now() });
  };

  const handleUpdate = (type, data) => {
    if (type === 'request') setRequests(r => r.map(x => x.id===data.id ? data : x));
    if (type === 'log') setLogs(l => [...l, data]);
    if (type === 'new_request') setRequests(r => [data, ...r]);
  };

  const handleCreateRequest = (req) => {
    handleUpdate('new_request', req);
    setPage('requests');
  };

  if (!user) return <LoginScreen onLogin={u=>{ setUser(u); setPage('dashboard'); }}/>;

  const defaultPage = { admin:'dashboard', production:'requests', maintenance:'requests', manager:'dashboard' };

  const renderPage = () => {
    switch(page) {
      case 'dashboard': return <Dashboard requests={requests} logs={logs} user={user}/>;
      case 'requests': return <RequestsList requests={requests} logs={logs} user={user} onUpdate={handleUpdate} setPage={setPage} toast={toast}/>;
      case 'create': return <CreateRequest user={user} onSubmit={handleCreateRequest} toast={toast}/>;
      case 'maintenance': return <RequestsList requests={requests.filter(r=>r.status!=='closed')} logs={logs} user={user} onUpdate={handleUpdate} setPage={setPage} toast={toast}/>;
      case 'reports': return <Reports requests={requests} logs={logs}/>;
      case 'users': return <UsersManagement toast={toast}/>;
      default: return <Dashboard requests={requests} logs={logs} user={user}/>;
    }
  };

  return (
    <div className="app-shell">
      <Sidebar user={user} active={page} setActive={setPage} isOpen={sidebarOpen} onClose={()=>setSidebarOpen(false)}/>
      <div className="main">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button className="menu-btn" onClick={()=>setSidebarOpen(o=>!o)}>☰</button>
            <span style={{fontSize:14,fontWeight:600,color:'var(--text2)'}}>
              { {dashboard:'📊 Tổng quan',requests:'📋 Yêu cầu sửa chữa',create:'➕ Tạo yêu cầu',maintenance:'🔧 Bảo trì',reports:'📈 Báo cáo',users:'👥 Tài khoản'}[page] }
            </span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:12,color:'var(--text3)'}} className="hide-mobile">
              <span className="mono">{user.employee_id}</span> · {ROLES[user.role]}
            </span>
            <button className="btn btn-sm btn-danger" onClick={()=>{ setUser(null); setPage('dashboard'); }}>
              ⏏ Đăng xuất
            </button>
          </div>
        </div>
        <div className="content">
          {renderPage()}
        </div>
      </div>
      {toastMsg && <Toast key={toastMsg.key} msg={toastMsg.msg} type={toastMsg.type} onClose={()=>setToastMsg(null)}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
